<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauernendspiel-Generator</title>
<script src="chess.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;display:flex;justify-content:center;padding:20px 8px 40px;}
#app{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:460px;}
h1{font-size:22px;font-weight:900;color:#3d3d3a;}
h1 span{color:#6B3F1A;}
.setup{width:100%;background:#fff;border:1px solid #e8e6de;border-radius:16px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:10px;}
.setup-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.setup-lbl{font-size:13px;font-weight:800;color:#3d3d3a;white-space:nowrap;min-width:130px;}
.pawn-btns{display:flex;gap:6px;}
.pb{width:36px;height:36px;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;border:2px solid #e0ddd6;background:#fff;color:#888;cursor:pointer;transition:all .15s;}
.pb:hover{border-color:#8B5E3C;color:#8B5E3C;}
.pb.active{background:#8B5E3C;color:#fff;border-color:#8B5E3C;}
.gen-btn{width:100%;padding:12px;border-radius:13px;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;border:none;cursor:pointer;background:#8B5E3C;color:#fff;box-shadow:0 4px 0 #6B3F1A;transition:transform .1s;}
.gen-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #6B3F1A;}
.gen-btn:disabled{background:#ccc;box-shadow:0 4px 0 #aaa;cursor:not-allowed;}
.key-row{display:flex;align-items:center;gap:8px;}
.key-row input{flex:1;padding:8px 12px;border-radius:10px;border:2px solid #e0ddd6;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#3d3d3a;outline:none;}
.key-row input:focus{border-color:#8B5E3C;}
.key-hint{font-size:11px;font-weight:700;color:#bbb;}
.key-hint a{color:#8B5E3C;text-decoration:none;}
.pbar{width:100%;display:flex;align-items:center;gap:9px;padding:7px 13px;background:#fff;border:1px solid #e8e6de;border-radius:13px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;}
.av-o{background:#FFD900;color:#5a3e00;}.av-y{background:#f0e3cd;color:#6B3F1A;}
.pname{font-weight:800;font-size:14px;color:#3d3d3a;flex:1;}
.badge{font-size:11px;font-weight:700;color:#888;background:#f5f4ef;padding:2px 9px;border-radius:20px;}
.engbadge{font-size:10px;font-weight:800;padding:2px 9px;border-radius:10px;}
.engbadge.loading{background:#fff3cd;color:#856404;}
.engbadge.ready{background:#d4edda;color:#155724;}
.engbadge.error{background:#f8d7da;color:#721c24;}
.mctr{font-size:12px;font-weight:700;color:#aaa;}
.board-outer{border-radius:14px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.22);border:4px solid #6B3F1A;display:inline-block;}
.board-frame{background:linear-gradient(145deg,#9B6B3C,#7A4E24);padding:14px;position:relative;}
.board-labels-left{position:absolute;left:0;top:14px;width:14px;display:flex;flex-direction:column;}
.board-labels-bottom{position:absolute;bottom:0;left:14px;height:14px;display:flex;}
.board-inner{display:grid;grid-template-columns:12px 1fr;grid-template-rows:1fr 12px;}
.rnks{display:flex;flex-direction:column;padding-right:3px;}
.rl{height:46px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:rgba(255,255,255,.5);width:14px;}
.frow{display:flex;padding-top:3px;margin-left:0;}
.fl{width:46px;text-align:center;font-size:9px;font-weight:900;color:rgba(255,255,255,.5);line-height:14px;}
.bmid{display:flex;}
#board{display:grid;grid-template-columns:repeat(8,46px);grid-template-rows:repeat(8,46px);border-radius:3px;overflow:hidden;}
.sq{width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:filter .1s;}
.sq:hover{filter:brightness(1.08);}
.lt{background:#F0D9B5;}.dk{background:#B58863;}
.sel.lt{background:#829769;}.sel.dk{background:#646f40;}
.hl.lt{background:#e5c67a;}.hl.dk{background:#b68f45;}
.lm.lt{background:#efd9a0;}.lm.dk{background:#c69f5a;}
.dot{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.17);pointer-events:none;z-index:2;}
.cring{position:absolute;width:42px;height:42px;border-radius:50%;border:3px solid rgba(0,0,0,.22);pointer-events:none;z-index:2;}
.evalrow{width:100%;display:flex;align-items:stretch;gap:3px;height:48px;}
.evalblk{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-radius:10px;transition:flex .6s cubic-bezier(.4,0,.2,1);overflow:hidden;min-width:0;}
.evalblk-b{background:#3a2e22;flex:50;}
.evalblk-w{background:#e8e6de;flex:50;}
.evalblk-label{font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;opacity:.6;}
.evalblk-b .evalblk-label{color:#c8a882;}
.evalblk-w .evalblk-label{color:#7a6a58;text-align:right;}
.evalblk-score{font-size:18px;font-weight:900;line-height:1.1;}
.evalblk-b .evalblk-score{color:#F0C040;}
.evalblk-w .evalblk-score{color:#3d3d3a;text-align:right;}
.evaldivider{width:3px;background:#fff;border-radius:2px;flex-shrink:0;align-self:stretch;}
.evalrow{position:relative;overflow:hidden;border-radius:10px;}
.evalrow.outcome-white-win,.evalrow.outcome-black-win{gap:0;}
.evalrow.outcome-white-win .evalblk-b{flex:0 0 0 !important;width:0 !important;max-width:0 !important;min-width:0 !important;padding:0 !important;border:0 !important;margin:0 !important;opacity:0;transform:none;overflow:hidden;}
.evalrow.outcome-white-win .evalblk-w{flex:100 !important;animation:evalWinnerExpand .8s cubic-bezier(.2,.8,.2,1);}
.evalrow.outcome-black-win .evalblk-w{flex:0 0 0 !important;width:0 !important;max-width:0 !important;min-width:0 !important;padding:0 !important;border:0 !important;margin:0 !important;opacity:0;transform:none;overflow:hidden;}
.evalrow.outcome-black-win .evalblk-b{flex:100 !important;animation:evalWinnerExpand .8s cubic-bezier(.2,.8,.2,1);}
.evalrow.outcome-white-win .evalblk-b .evalblk-label,.evalrow.outcome-white-win .evalblk-b .evalblk-score,
.evalrow.outcome-black-win .evalblk-w .evalblk-label,.evalrow.outcome-black-win .evalblk-w .evalblk-score{display:none;}
.evalrow.outcome-white-win .evaldivider,.evalrow.outcome-black-win .evaldivider{width:0;opacity:0;}
.evalrow.outcome-draw .evalblk-b,.evalrow.outcome-draw .evalblk-w{flex:50 !important;animation:evalDrawPulse 1.2s ease-in-out infinite;}
.evalrow.outcome-draw .evaldivider{background:#fff;width:3px;}
@keyframes evalWinnerExpand{0%{transform:scale(.95);filter:saturate(.7);}60%{transform:scale(1.02);}100%{transform:scale(1);filter:saturate(1);}}
@keyframes evalDrawPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.08);}}
/* ── Move rating card ── */
.move-card{width:100%;background:#fff;border:1px solid #e8e6de;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.move-card-top{display:flex;align-items:center;gap:0;padding:0;}
.move-info{flex:1;padding:10px 12px;}
.rating-label{font-size:13px;font-weight:900;letter-spacing:.02em;}
.rating-label.great{color:#8B5E3C;} .rating-label.good{color:#6B3F1A;}
.rating-label.ok{color:#9a6400;} .rating-label.bad{color:#c0392b;} .rating-label.blunder{color:#c0392b;} .rating-label.idle{color:#aaa;}
.cp-row{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap;}
.cp-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;background:#f5f4ef;}
.cp-pill .cp-label{color:#aaa;font-weight:700;}
.cp-pill .cp-val{color:#3d3d3a;}
.cp-pill .cp-val.pos{color:#8B5E3C;} .cp-pill .cp-val.neg{color:#c0392b;}
.cp-arrow{font-size:14px;color:#ccc;}
.explain-btn{margin:0 10px 10px;width:calc(100% - 20px);padding:8px;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;border:1.5px solid #e0ddd6;background:#f9f8f4;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.explain-btn:hover{border-color:#8B5E3C;color:#8B5E3C;background:#fdf7ef;}
.explain-btn:disabled{opacity:.5;cursor:not-allowed;}
.explain-box{margin:0 10px 10px;padding:10px 12px;border-radius:10px;background:#f5f4ef;font-size:13px;font-weight:700;color:#3d3d3a;line-height:1.5;display:none;}
.explain-box.visible{display:block;}
.thdots{display:flex;gap:5px;align-items:center;padding:2px 0;}
.dp{width:7px;height:7px;border-radius:50%;background:#bbb;animation:pulse 1.2s ease-in-out infinite;}
.dp:nth-child(2){animation-delay:.2s;}.dp:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1.1);}}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px #f3dfb8;}50%{box-shadow:0 0 0 4px #ddb56a;}}
.btnrow{display:flex;gap:9px;width:100%;}
.btn{flex:1;padding:10px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;border:none;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.96);}
.btnp{background:#8B5E3C;color:#fff;box-shadow:0 4px 0 #6B3F1A;}
.btnp:active{box-shadow:0 1px 0 #6B3F1A;transform:translateY(3px);}
.btns{background:#fff;border:2px solid #e0ddd6;color:#888;}
.ctrow{width:100%;display:flex;align-items:center;gap:10px;}
.ctlbl{font-size:12px;font-weight:700;color:#888;white-space:nowrap;}
input[type=range]{flex:1;accent-color:#8B5E3C;}
.ctval{font-size:12px;font-weight:800;color:#3d3d3a;min-width:58px;}
</style>
</head>
<body>
<div id="app">
  <h1>♟ Bauern<span>endspiel</span></h1>

  <div class="board-outer" style="align-self:center;">
    <div class="board-frame">
      <div class="board-labels-left">
        <span class="rl">8</span><span class="rl">7</span><span class="rl">6</span><span class="rl">5</span><span class="rl">4</span><span class="rl">3</span><span class="rl">2</span><span class="rl">1</span>
      </div>
      <div id="board"></div>
      <div class="board-labels-bottom">
        <span class="fl">a</span><span class="fl">b</span><span class="fl">c</span><span class="fl">d</span><span class="fl">e</span><span class="fl">f</span><span class="fl">g</span><span class="fl">h</span>
      </div>
    </div>
  </div>

  <div class="evalrow">
    <div class="evalblk evalblk-b" id="evalblk-b">
      <div class="evalblk-label">Schwarz</div>
      <div class="evalblk-score" id="evallbl-b">—</div>
    </div>
    <div class="evaldivider"></div>
    <div class="evalblk evalblk-w" id="evalblk-w">
      <div class="evalblk-label">Weiß</div>
      <div class="evalblk-score" id="evallbl-w">—</div>
    </div>
  </div>

  <div class="move-card" id="move-card">
    <div class="move-card-top">
      <div class="move-info" style="padding:10px 14px;">
        <div class="rating-label idle" id="rating-label">Ziehe eine Figur</div>
        <div class="cp-row" id="cp-row">
          <span class="cp-pill"><span class="cp-label">Dein Zug</span>&nbsp;<span class="cp-val" id="cp-player-move" style="color:#3d3d3a;font-size:12px;">—</span>&nbsp;<span class="cp-val" id="cp-player">—</span></span>
          <span class="cp-arrow">→</span>
          <span class="cp-pill"><span class="cp-label">Bester Zug</span>&nbsp;<span class="cp-val" id="cp-best-move" style="color:#3d3d3a;font-size:12px;">—</span>&nbsp;<span class="cp-val" id="cp-best">—</span></span>
        </div>
      </div>
      <div class="move-turn" style="display:flex;align-items:center;gap:9px;padding:7px 13px;border-left:1px solid #e8e6de;">
        <div id="turn-dot" style="width:6px;height:6px;border-radius:50%;background:#ccc;box-shadow:none;animation:none;"></div>
        <span class="mctr" id="mctr" style="font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#aaa;letter-spacing:.06em;text-transform:uppercase;">ZUG 1</span>
      </div>
    </div>
    <button class="explain-btn" id="explain-btn" onclick="loadExplanation()" style="display:none">
      🦉 Tobold erklärt warum
    </button>
    <div class="explain-box" id="explain-box"></div>
  </div>

  <!-- Endgame situation panel (zwischen Züge und Buttons) -->
  <div id="situation-panel" style="display:none;width:100%;background:#fff;border:1px solid #e8e6de;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#1a0e06;cursor:pointer;" onclick="toggleSituation()">
      <span style="font-size:16px;">♚</span>
      <span id="sit-title" style="font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#F0C040;flex:1;"></span>
      <span id="sit-arrow" style="font-size:12px;color:#F0C040;font-weight:700;">▼</span>
    </div>
    <div id="sit-body" style="padding:12px 14px;display:flex;flex-direction:column;gap:10px;">
      <div id="sit-goals"></div>
      <div id="sit-warnings" style="display:none;"></div>
      <button onclick="toggleWarnings()" id="warn-btn" style="align-self:flex-start;padding:5px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;border:1.5px solid #e0ddd6;background:#f9f8f4;color:#888;cursor:pointer;">⚠️ Häufige Fehler zeigen</button>
      <div id="sit-tip" style="font-size:12px;font-weight:700;color:#8B5E3C;background:#FFF9F0;border-radius:8px;padding:8px 10px;border-left:3px solid #F0C040;"></div>
    </div>
  </div>

  <div class="btnrow">
    <button class="btn btnp" id="gen-btn" onclick="generatePosition()" disabled>⏳ Stockfish lädt…</button>
    <button class="btn btns" onclick="undoLast()">↩ Zurück</button>
  </div>

  <!-- game status panel removed (requested) -->

  <div class="setup" style="padding:12px 18px;">
    <div class="setup-row">
      <span class="setup-lbl">Bauern pro Seite:</span>
      <div class="pawn-btns">
        <button class="pb" onclick="setPawns(1)">1</button>
        <button class="pb active" onclick="setPawns(2)">2</button>
        <button class="pb" onclick="setPawns(3)">3</button>
        <button class="pb" onclick="setPawns(4)">4</button>
        <button class="pb" onclick="setPawns(5)">5</button>
      </div>
    </div>
  </div>

  <div class="ctrow">
    <span class="ctlbl">Schwierigkeit:</span>
    <input type="range" min="1" max="3" value="2" id="diffsl" oninput="updDiff(this.value)" style="flex:1;">
    <span class="ctval" id="diffval" style="min-width:80px;">Mittel</span>
  </div>
  <div class="ctrow">
    <span class="ctlbl">Tobold Stärke:</span>
    <input type="range" min="0" max="20" value="4" id="sksl" oninput="updSkill(this.value)">
    <span class="ctval" id="skval">Skill 4</span>
  </div>
</div>

<script>
// ── PIECES ────────────────────────────────────────────
function PC(w) {
  return w
    ? {body:'#FFF8E7',mid:'#EED9A0',eye:'#3D2310',shine:'#FFFFFF',blush:'#FFB8A0',ol:'#6B3F1A',gold:'#F0C040',goldD:'#C89020'}
    : {body:'#2C1A0E',mid:'#4A2E18',eye:'#FFFFFF',shine:'rgba(255,255,255,0.45)',blush:'#5C2A1A',ol:'#0D0603',gold:'#C89020',goldD:'#8B5E10'};
}
function svgWrap(inner, flip) {
  var g = flip ? '<g transform="scale(1,-1) translate(0,-48)">' + inner + '</g>' : inner;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="40" height="40">' + g + '</svg>';
}
function drawPawn(w, flip) {
  var c = PC(w);
  return svgWrap(
    '<path d="M12 43 Q11 38 16 37 L32 37 Q37 38 36 43Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<path d="M15 37 Q14 33 15 31 L33 31 Q34 33 33 37Z" fill="' + c.mid + '" stroke="' + c.ol + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<path d="M19 31 Q18 27 20 25 L28 25 Q30 27 29 31Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<circle cx="24" cy="19" r="9" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5"/>' +
    '<ellipse cx="20.5" cy="18" rx="2.5" ry="3" fill="' + c.eye + '"/>' +
    '<ellipse cx="27.5" cy="18" rx="2.5" ry="3" fill="' + c.eye + '"/>' +
    '<circle cx="20.5" cy="18.5" r="1.5" fill="' + (w ? '#3D2310' : '#555') + '"/>' +
    '<circle cx="27.5" cy="18.5" r="1.5" fill="' + (w ? '#3D2310' : '#555') + '"/>' +
    '<circle cx="21.2" cy="17.8" r="0.7" fill="' + c.shine + '"/>' +
    '<circle cx="28.2" cy="17.8" r="0.7" fill="' + c.shine + '"/>' +
    '<path d="M21 22.5 Q24 25 27 22.5" fill="none" stroke="' + c.eye + '" stroke-width="1.3" stroke-linecap="round"/>' +
    '<ellipse cx="18" cy="21" rx="2.5" ry="1.5" fill="' + c.blush + '" opacity="0.6"/>' +
    '<ellipse cx="30" cy="21" rx="2.5" ry="1.5" fill="' + c.blush + '" opacity="0.6"/>'
  , flip);
}
function drawKing(w, flip) {
  var c = PC(w);
  return svgWrap(
    '<path d="M9 43 Q8 39 12 38 L36 38 Q40 39 39 43Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<path d="M13 38 Q11 32 11 24 Q17 28 24 28 Q31 28 37 24 Q37 32 35 38Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5"/>' +
    '<path d="M11 24 Q10 17 13 13 Q17 10 24 10 Q31 10 35 13 Q38 17 37 24 Q31 28 24 28 Q17 28 11 24Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5"/>' +
    '<circle cx="24" cy="8.5" r="7.5" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5"/>' +
    '<ellipse cx="20.5" cy="7.5" rx="2.5" ry="2.8" fill="' + c.eye + '"/>' +
    '<ellipse cx="27.5" cy="7.5" rx="2.5" ry="2.8" fill="' + c.eye + '"/>' +
    '<ellipse cx="20.5" cy="8" rx="1.7" ry="2" fill="' + (w ? '#2C1A0E' : '#ddd') + '"/>' +
    '<ellipse cx="27.5" cy="8" rx="1.7" ry="2" fill="' + (w ? '#2C1A0E' : '#ddd') + '"/>' +
    '<circle cx="21.3" cy="7.2" r="0.7" fill="' + c.shine + '"/>' +
    '<circle cx="28.3" cy="7.2" r="0.7" fill="' + c.shine + '"/>' +
    '<path d="M18 5.2 Q20.5 3.8 23 5" fill="' + c.mid + '" stroke="' + c.ol + '" stroke-width="1.8" stroke-linecap="round"/>' +
    '<path d="M25 5 Q27.5 3.8 30 5.2" fill="' + c.mid + '" stroke="' + c.ol + '" stroke-width="1.8" stroke-linecap="round"/>' +
    '<path d="M21 11.5 Q24 10.5 27 11.5" fill="none" stroke="' + c.eye + '" stroke-width="1.3" stroke-linecap="round"/>' +
    '<path d="M20 13 Q24 15 28 13" fill="' + c.mid + '" stroke="' + c.ol + '" stroke-width="1" stroke-linecap="round"/>' +
    '<path d="M15.5 4 L15.5 8.5 L18.5 6.5 L21 9 L24 4.5 L27 9 L29.5 6.5 L32.5 8.5 L32.5 4Z" fill="' + c.gold + '" stroke="' + c.goldD + '" stroke-width="1.3"/>' +
    '<rect x="23" y="0.5" width="2" height="5" rx="1" fill="' + c.gold + '" stroke="' + c.goldD + '" stroke-width="0.8"/>' +
    '<rect x="21" y="2" width="6" height="2" rx="1" fill="' + c.gold + '" stroke="' + c.goldD + '" stroke-width="0.8"/>' +
    '<circle cx="24" cy="5" r="2" fill="#FF3B5C" stroke="' + c.goldD + '" stroke-width="0.7"/>'
  , flip);
}
function drawQueen(w, flip) {
  var c = PC(w);
  return svgWrap(
    '<path d="M9 43 Q8 39 12 38 L36 38 Q40 39 39 43Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<path d="M13 38 Q11 32 11 24 Q17 28 24 28 Q31 28 37 24 Q37 32 35 38Z" fill="' + c.body + '" stroke="' + c.ol + '" stroke-width="1.5"/>' +

// ── STOCKFISH ─────────────────────────────────────────
var sf = null, sfReady = false;
var pendingResolve = null, pendingLines = [];
var skillLevel = 4, numPawns = 2;

function initStockfish() {
  try {
    sf = new Worker('stockfish.js');
    sf.onmessage = function(e) {
      var line = e.data;
      if (line === 'uciok') { sf.postMessage('isready'); return; }
      if (line === 'readyok') {
        sfReady = true;
        var btn = document.getElementById('gen-btn');
        btn.textContent = '🎲 Neue Stellung generieren';
        btn.disabled = false;
        generatePosition();
        return;
      }
      if (line.startsWith('bestmove')) {
        var bm = line.split(' ')[1];
        if (pendingResolve) {
          pendingResolve({ bestmove: bm, lines: pendingLines.slice() });
          pendingResolve = null;
          pendingLines = [];
        }
        return;
      }
      if (line.startsWith('info') && line.indexOf('score') >= 0) {
        pendingLines.push(line);
      }
    };
    sf.onerror = function() {
      var btn = document.getElementById('gen-btn');
      btn.textContent = '🎲 Neue Stellung generieren';
      btn.disabled = false;
      setGameStatus('Stockfish-Fehler — per lokalem Server öffnen (npx serve .)', 'lose');
    };
    sf.postMessage('uci');
  } catch(e) {
  }
}

// Returns Promise<{bestmove, lines}>
// cp in lines is ALWAYS from side-to-move perspective
function sfSearch(fen, depth, skill) {
  return new Promise(function(resolve) {
    if (!sfReady || !sf) { resolve(null); return; }
    pendingResolve = resolve;
    pendingLines = [];
    sf.postMessage('ucinewgame');
    if (skill !== null) sf.postMessage('setoption name Skill Level value ' + skill);
    sf.postMessage('position fen ' + fen);
    sf.postMessage('go depth ' + depth);
  });
}

function parseCPsideToMove(lines) {
  // We encode "mate in X" into a synthetic CP value so we don't lose X.
  // Sign: + = side-to-move gets mate, - = side-to-move gets mated.
  // Magnitude: 9000 + X
  var MATE_BASE = 9000;
  for (var i = lines.length - 1; i >= 0; i--) {
    var m = lines[i].match(/score cp (-?\d+)/);
    if (m) return parseInt(m[1]);
    var mm = lines[i].match(/score mate (-?\d+)/);
    if (mm) {
      var mateRaw = parseInt(mm[1]); // e.g. 3 or -3
      var x = Math.abs(mateRaw);
      var sign = mateRaw > 0 ? 1 : -1;
      return sign * (MATE_BASE + x);
    }
  }
  return null;
}

function parsePV(lines) {
  for (var i = lines.length - 1; i >= 0; i--) {
    var m = lines[i].match(/ pv ([\w ]+)/);
    if (m) return m[1].trim().split(' ').slice(0, 5);
  }
  return [];
}

// Convert side-to-move cp to white-perspective cp
function toWhiteCP(cp, fen) {
  return fen.split(' ')[1] === 'b' ? -cp : cp;
}

// Full eval: returns {cp (white-perspective), bestmove, bestSAN, pvSAN}
function evalFull(fen, depth) {
  return sfSearch(fen, depth, null).then(function(res) {
    if (!res) return null;
    var cpRaw = parseCPsideToMove(res.lines);
    if (cpRaw === null) return null;
    var cp = toWhiteCP(cpRaw, fen);
    var bestSAN = res.bestmove ? uciToSAN(fen, res.bestmove) : null;
    var pvUCI = parsePV(res.lines);
    var pvSAN = pvUCItoSAN(fen, pvUCI);
    return { cp: cp, bestmove: res.bestmove, bestSAN: bestSAN, pvSAN: pvSAN };
  });
}

function evalPosition(fen, depth) {
  return sfSearch(fen, depth, null).then(function(res) {
    if (!res) return null;
    var cp = parseCPsideToMove(res.lines);
    if (cp === null) return null;
    return toWhiteCP(cp, fen);
  });
}

function uciToSAN(fen, uciMove) {
  try {
    var g = new Chess(fen);
    var res = g.move({ from: uciMove.slice(0,2), to: uciMove.slice(2,4), promotion: uciMove[4] || 'q' });
    return res ? res.san : uciMove;
  } catch(e) { return uciMove; }
}

function pvUCItoSAN(fen, pvUCI) {
  var result = [];
  try {
    var g = new Chess(fen);
    for (var i = 0; i < pvUCI.length; i++) {
      var res = g.move({ from: pvUCI[i].slice(0,2), to: pvUCI[i].slice(2,4), promotion: pvUCI[i][4] || 'q' });
      if (!res) break;
      result.push(res.san);
    }
  } catch(e) {}
  return result;
}

// Board as ASCII for Claude
function fenToBoard(fen) {
  var pos = fen.split(' ')[0];
  var rows = pos.split('/');
  var s = '  a b c d e f g h\n';
  for (var i = 0; i < rows.length; i++) {
    s += (8 - i) + ' ';
    for (var j = 0; j < rows[i].length; j++) {
      var ch = rows[i][j];
      if (/\d/.test(ch)) {
        for (var k = 0; k < parseInt(ch); k++) s += '. ';
      } else {
        s += ch + ' ';
      }
    }
    s += (8 - i) + '\n';
  }
  s += '  a b c d e f g h';
  return s;
}

// difficulty: 1=Leicht(+80..+200), 2=Mittel(+30..+150), 3=Schwer(+10..+80)
var difficulty = 2;
var DIFF_RANGES = { 1:[80,200], 2:[30,150], 3:[10,80] };
var DIFF_LABELS = { 1:'Leicht', 2:'Mittel', 3:'Schwer' };
var DIFF_DESC   = { 1:'Klarer Vorteil — lerne die Technik', 2:'Realistisches Spiel — muss gearbeitet werden', 3:'Knapper Vorteil — kein Fehler erlaubt' };

  document.getElementById('diffval').title = DIFF_DESC[v];
}

}

// ── POSITION GENERATOR ────────────────────────────────
var generating = false;
// Wie viele zufällige Stellungen maximal probiert werden, bis eine in den CP-Bereich passt.
// (Früher: 40 — oft zu wenig bei „Schwer“ oder vielen Bauern.)
var MAX_POSITION_ATTEMPTS = 800;
// Stockfish-Tiefe beim Filtern zufälliger Stellungen (höher = genauer, aber langsamer pro Versuch).
var GENERATOR_STOCKFISH_DEPTH = 14;

function generatePosition() {
  if (!sfReady || generating) return;
  generating = true;
  var btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Suche Stellung…';
  var range = DIFF_RANGES[difficulty] || DIFF_RANGES[2];
  setGameStatus('Suche ' + DIFF_LABELS[difficulty] + '-Stellung (' + (range[0]/100).toFixed(2) + ' bis +' + (range[1]/100).toFixed(2) + ')…', '');
  tryNextPosition(0);
}

function tryNextPosition(attempt) {
  if (attempt >= MAX_POSITION_ATTEMPTS) {
    setGameStatus('Keine passende Stellung nach ' + MAX_POSITION_ATTEMPTS + ' Versuchen — Schwierigkeit lockern oder erneut klicken.', '');
    var btn = document.getElementById('gen-btn');
    btn.disabled = false;
    btn.textContent = '🎲 Neue Stellung generieren';
    generating = false;
    return;
  }
  var fen = buildFen(numPawns);
  if (!fen) { tryNextPosition(attempt + 1); return; }
  var testGame = new Chess(fen);
  if (!testGame || testGame.moves().length === 0 || testGame.in_check()) {
    tryNextPosition(attempt + 1);
    return;
  }
  // Extra: verify kings are not adjacent (chess.js sometimes accepts these)
  if (!kingsWellSeparated(testGame)) {
    tryNextPosition(attempt + 1);
    return;
  }
  evalPosition(fen, GENERATOR_STOCKFISH_DEPTH).then(function(cp) {
    var range = DIFF_RANGES[difficulty] || DIFF_RANGES[2];
    if (cp === null || cp < range[0] || cp > range[1]) {
      tryNextPosition(attempt + 1);
      return;
    }
    startGame(fen, cp);
    var btn = document.getElementById('gen-btn');
    btn.disabled = false;
    btn.textContent = '🎲 Neue Stellung generieren';
    generating = false;
  });
}

function kingsWellSeparated(g) {
  var board = g.board();
  var wKr=-1,wKc=-1,bKr=-1,bKc=-1;
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var sq=board[r][c];
    if(!sq)continue;
    if(sq.type==='k'&&sq.color==='w'){wKr=r;wKc=c;}
    if(sq.type==='k'&&sq.color==='b'){bKr=r;bKc=c;}
  }
  if(wKr<0||bKr<0)return false;
  // Kings must be at least 2 squares apart in both row and column (or combined)
  var dr=Math.abs(wKr-bKr), dc=Math.abs(wKc-bKc);
  return (dr>=2||dc>=2) && !(dr<=1&&dc<=1);
}

function buildFen(n) {
  var board = [];
  for (var i = 0; i < 8; i++) board.push([null,null,null,null,null,null,null,null]);
  var wKr, wKc, bKr, bKc, ok = false;
  for (var t = 0; t < 100 && !ok; t++) {
    wKr = 4 + Math.floor(Math.random() * 3);
    wKc = Math.floor(Math.random() * 8);
    bKr = 1 + Math.floor(Math.random() * 3);
    bKc = Math.floor(Math.random() * 8);
    if (Math.abs(wKr - bKr) >= 2 && Math.abs(wKc - bKc) >= 2) ok = true;
  }
  if (!ok) return null;
  board[wKr][wKc] = 'K';
  board[bKr][bKc] = 'k';
  var cols = shuffled8();
  for (var i = 0; i < n; i++) {
    var c = cols[i];
    var opts = [2,3,4,5].filter(function(r) { return !board[r][c]; });
    if (!opts.length) return null;
    board[opts[Math.floor(Math.random() * opts.length)]][c] = 'P';
  }
  var cols2 = shuffled8();
  for (var i = 0; i < n; i++) {
    var c = cols2[i];
    var opts = [2,3,4,5].filter(function(r) { return !board[r][c]; });
    if (!opts.length) return null;
    board[opts[Math.floor(Math.random() * opts.length)]][c] = 'p';
  }
  var rows = [];
  for (var r = 0; r < 8; r++) {
    var s = '', e = 0;
    for (var c = 0; c < 8; c++) {
      if (board[r][c]) { if (e) { s += e; e = 0; } s += board[r][c]; }
      else e++;
    }
    if (e) s += e;
    rows.push(s);
  }
  return rows.join('/') + ' w - - 0 1';
}

function shuffled8() {
  var a = [0,1,2,3,4,5,6,7];
  for (var i = 7; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ── GAME STATE ────────────────────────────────────────
var game = null, sel = null, lastMv = null, mvCnt = 1, hist = [], busy = false;
var evalOutcome = null; // null | 'white-win' | 'black-win' | 'draw'

function setEvalOutcome(outcome) {
  evalOutcome = outcome;
  var row = document.querySelector('.evalrow');
  if (!row) return;
  row.classList.remove('outcome-white-win', 'outcome-black-win', 'outcome-draw');
  if (outcome === 'white-win') row.classList.add('outcome-white-win');
  if (outcome === 'black-win') row.classList.add('outcome-black-win');
  if (outcome === 'draw') row.classList.add('outcome-draw');
}

function startGame(fen, initialCp) {
  game = new Chess(fen);
  sel = null; lastMv = null; mvCnt = 1;
  hist = [{ fen: fen }];
  busy = false;
  setEvalOutcome(null);
  renderBoard();
  setEval(initialCp);
  setGameStatus('', '');
  resetRatingCard();
  updateSituation();
  document.getElementById('mctr').textContent = 'ZUG 1';
  var cpStr = (initialCp / 100).toFixed(2);
  var tips = [
    'Aktiviere deinen König — er ist im Endspiel deine stärkste Figur!',
    'Suche nach Freibauern: kein schwarzer Bauer auf derselben Linie.',
    'Opposition: König direkt gegenüber (1 Feld Abstand) erzwingt den Durchmarsch.',
    'Randbauernn (a/h) sind schwer zu verwerten — bevorzuge zentrale Bauern.',
    'Verbundene Freibauern sind extrem stark — führe sie gemeinsam vor.'
  ];
  var tip = tips[Math.floor(Math.random() * tips.length)];
  setGameStatus('', '');
  setTurnDot(true);
}

// ── BOARD RENDER ──────────────────────────────────────
function rc2sq(r, c) { return 'abcdefgh'[c] + (8 - r); }
function getEl(sq) { return document.querySelector('[data-sq="' + sq + '"]'); }

function renderBoard() {
  if (!game) return;
  var el = document.getElementById('board');
  el.innerHTML = '';
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var sq = rc2sq(r, c);
      var p = game.get(sq);
      var div = document.createElement('div');
      div.className = 'sq ' + ((r + c) % 2 === 0 ? 'lt' : 'dk');
      if (lastMv && (lastMv.from === sq || lastMv.to === sq)) div.classList.add('lm');
      div.dataset.sq = sq;
      div.onclick = (function(s) { return function() { handleClick(s); }; })(sq);
      if (p) {
        var key = (p.color === 'w' ? 'w' : 'b') + p.type.toUpperCase();
        if (PSVG[key]) div.innerHTML = PSVG[key]();
      }
      el.appendChild(div);
    }
  }
  if (sel) {
    var selEl = getEl(sel);
    if (selEl) selEl.classList.add('sel');
    var moves = game.moves({ square: sel, verbose: true });
    for (var i = 0; i < moves.length; i++) {
      var mEl = getEl(moves[i].to);
      if (!mEl) continue;
      mEl.classList.add('hl');
      var dot = document.createElement('div');
      dot.className = game.get(moves[i].to) ? 'cring' : 'dot';
      mEl.appendChild(dot);
    }
  }
}

// ── CLICK ─────────────────────────────────────────────
function handleClick(sq) {
  if (!game || game.turn() !== 'w' || busy) return;
  var p = game.get(sq);
  if (sel) {
    var moves = game.moves({ square: sel, verbose: true });
    var mv = null;
    for (var i = 0; i < moves.length; i++) { if (moves[i].to === sq) { mv = moves[i]; break; } }
    if (mv) {
      var fenBefore = game.fen();
      var mo = { from: sel, to: sq };
      if (mv.flags && mv.flags.indexOf('p') >= 0) mo.promotion = 'q';
      var res = game.move(mo);
      if (res) {
        lastMv = { from: sel, to: sq };
        sel = null;
        mvCnt++;
        hist.push({ fen: game.fen() });
        document.getElementById('mctr').textContent = 'ZUG ' + mvCnt;
        renderBoard();
        updateSituation();
        if (!checkEnd()) afterMove(fenBefore, res);
      }
      return;
    }
    if (p && p.color === 'w') { sel = sq; renderBoard(); return; }
    sel = null; renderBoard(); return;
  }
  if (p && p.color === 'w') { sel = sq; renderBoard(); }
}

function setTurnDot(yourTurn) {
  var dot = document.getElementById('turn-dot');
  if (!dot) return;
  var mctr = document.getElementById('mctr');
  if (yourTurn) {
    dot.style.background = '#C89020';
    dot.style.boxShadow = '0 0 0 2px #f3dfb8';
    dot.style.animation = 'glow 1.4s ease-in-out infinite';
    if (mctr) mctr.style.color = '#6B3F1A';
  } else {
    dot.style.background = '#ccc';
    dot.style.boxShadow = 'none';
    dot.style.animation = 'none';
    if (mctr) mctr.style.color = '#aaa';
  }
}

// ── AFTER PLAYER MOVE ─────────────────────────────────
function afterMove(fenBefore, move) {
  busy = true;
  setTurnDot(false);

  // evalFull on fenBefore: gives best possible CP and best move from this position
  // evalFull on fenAfter:  gives actual CP after player's move
  // Both use toWhiteCP internally so both are white-perspective
  evalFull(fenBefore, 14).then(function(sfBest) {
    var cpBeforeEval = sfBest ? sfBest.cp : 0;
    var bestUci = sfBest ? sfBest.bestmove : null;

    evalFull(game.fen(), 14).then(function(sfAfter) {
      var cpAfterActual = sfAfter ? sfAfter.cp : 0;
      var isBestMove = !sfBest || !sfBest.bestmove ||
        sfBest.bestmove.slice(0, 4) === (move.from + move.to);

      setEval(cpAfterActual);

      var bestSAN = sfBest ? sfBest.bestSAN : null;
      var pvSAN   = sfBest ? sfBest.pvSAN   : [];

      function scheduleTobold() {
        // Important: start Stockfish search AFTER all additional evaluations are done.
        // Otherwise we may send overlapping commands to the same Worker.
        setTimeout(function() {
          if (game.turn() === 'b' && !checkEnd()) {
            sfSearch(game.fen(), 14, skillLevel).then(function(oscRes) {
              if (oscRes && oscRes.bestmove && oscRes.bestmove !== '(none)') {
                var from = oscRes.bestmove.slice(0, 2);
                var to   = oscRes.bestmove.slice(2, 4);
                var promo = oscRes.bestmove[4] || 'q';
                var res = game.move({ from: from, to: to, promotion: promo });
                if (res) {
                  lastMv = { from: from, to: to };
                  hist.push({ fen: game.fen() });
                  evalFull(game.fen(), 8).then(function(sfPost) {
                    if (sfPost) setEval(sfPost.cp);
                    renderBoard();
                    updateSituation();
                    checkEnd();
                  });
                }
              }
              busy = false;
              setTurnDot(true);
            });
          } else {
            busy = false;
            setTurnDot(true);
          }
        }, 200);
      }

      // Compute evaluation after the Engine's best move
      if (!bestUci) {
        var cpBestAfterEval = cpBeforeEval;
        var cpLoss = Math.max(0, cpBestAfterEval - cpAfterActual);
        askClaudeForFeedback(
          fenBefore, game.fen(), move.san, move.from + move.to + (move.promotion || ''), bestSAN, null,
          cpBeforeEval, cpAfterActual, cpBestAfterEval,
          cpAfterActual - cpBestAfterEval, cpLoss,
          isBestMove, pvSAN
        );
        scheduleTobold();
      } else {
        var gBest = null;
        var fenAfterBest = null;
        try {
          gBest = new Chess(fenBefore);
          var fromB = bestUci.slice(0, 2);
          var toB = bestUci.slice(2, 4);
          var moB = { from: fromB, to: toB };
          if (bestUci.length >= 5 && bestUci[4]) {
            moB.promotion = String(bestUci[4]).toLowerCase();
          }
          var resB = gBest.move(moB);
          if (resB) fenAfterBest = gBest.fen();
        } catch (e) {}

        // Fallback: if applying UCI failed, try applying the move as SAN.
        // This prevents mismatches between the displayed "Bester Zug" and its CP value.
        if (!fenAfterBest && bestSAN && bestSAN !== '—') {
          try {
            var gBest2 = new Chess(fenBefore);
            var resSAN = gBest2.move(bestSAN);
            if (resSAN) fenAfterBest = gBest2.fen();
          } catch (e) {}
        }

        if (!fenAfterBest) {
          var cpBestAfterEval = cpBeforeEval;
          var cpLoss = Math.max(0, cpBestAfterEval - cpAfterActual);
          askClaudeForFeedback(
            fenBefore, game.fen(), move.san, move.from + move.to + (move.promotion || ''), bestSAN, bestUci,
            cpBeforeEval, cpAfterActual, cpBestAfterEval,
            cpAfterActual - cpBestAfterEval, cpLoss,
            isBestMove, pvSAN
          );
          scheduleTobold();
        } else {
          evalPosition(fenAfterBest, 14).then(function(cpBestAfterEval) {
            if (cpBestAfterEval === null || cpBestAfterEval === undefined) cpBestAfterEval = cpBeforeEval;
            var cpLoss = Math.max(0, cpBestAfterEval - cpAfterActual);
            askClaudeForFeedback(
              fenBefore, game.fen(), move.san, move.from + move.to + (move.promotion || ''), bestSAN, bestUci,
              cpBeforeEval, cpAfterActual, cpBestAfterEval,
              cpAfterActual - cpBestAfterEval, cpLoss,
              isBestMove, pvSAN
            );
            scheduleTobold();
          });
        }
      }
    });
  });
}

// ── CLAUDE FEEDBACK ───────────────────────────────────

var lastMoveContext = null;

var RATINGS = {
  best:    { cls: 'great',   icon: '★',  label: 'Bester Zug' },
  great:   { cls: 'great',   icon: '✦',  label: 'Sehr gut' },
  good:    { cls: 'good',    icon: '●',  label: 'Guter Zug' },
  ok:      { cls: 'ok',      icon: '▲',  label: 'Ungenau' },
  bad:     { cls: 'bad',     icon: '✖',  label: 'Fehler' },
  blunder: { cls: 'blunder', icon: '??', label: 'Grober Fehler' },
};

function classifyMove(cpLoss, isBestMove) {
  if (isBestMove)   return 'best';
  if (cpLoss <  20) return 'great';
  if (cpLoss <  60) return 'good';
  if (cpLoss < 150) return 'ok';
  if (cpLoss < 300) return 'bad';
  return 'blunder';
}

function cpStr(cp) {
  if (cp === null || cp === undefined) return '—';
  var MATE_BASE = 9000;
  if (Math.abs(cp) > MATE_BASE) {
    var x = Math.abs(cp) - MATE_BASE;
    if (!x || x < 1) return cp > 0 ? '+M' : '-M';
    return (cp > 0 ? '+' : '-') + 'M(' + x + ')';
  }
  return (cp >= 0 ? '+' : '') + (cp / 100).toFixed(2);
}

function resetRatingCard() {
  lastMoveContext = null;
  document.getElementById('rating-label').className = 'rating-label idle';
  document.getElementById('rating-label').textContent = 'Ziehe eine Figur';
  document.getElementById('cp-player-move').textContent = '—';
  document.getElementById('cp-player').textContent = '—';
  document.getElementById('cp-player').className = 'cp-val';
  document.getElementById('cp-best-move').textContent = '—';
  document.getElementById('cp-best-move').style.color = '#3d3d3a';
  document.getElementById('cp-best').textContent = '—';
  document.getElementById('cp-best').className = 'cp-val';
  document.getElementById('explain-btn').style.display = 'none';
  document.getElementById('explain-box').className = 'explain-box';
  document.getElementById('explain-box').innerHTML = '';
}

function setMoveRating(ratingKey, cpPlayer, cpBestMove, playerMove, bestMove) {
  var r = RATINGS[ratingKey] || RATINGS.ok;
  var label = document.getElementById('rating-label');
  var cpPl  = document.getElementById('cp-player');
  var cpBst = document.getElementById('cp-best');
  var movePl  = document.getElementById('cp-player-move');
  var moveBst = document.getElementById('cp-best-move');
  var btn   = document.getElementById('explain-btn');
  var box   = document.getElementById('explain-box');

  label.className = 'rating-label ' + r.cls;
  label.textContent = r.icon + ' ' + r.label;

  // Player move + CP
  movePl.textContent = playerMove || '—';
  movePl.style.fontWeight = '900';
  movePl.style.color = '#3d3d3a';
  cpPl.textContent  = cpStr(cpPlayer);
  cpPl.className    = 'cp-val' + (cpPlayer >= 0 ? ' pos' : ' neg');

  // Best move + CP
  var isBest = !bestMove || bestMove === playerMove;
  moveBst.textContent = isBest ? '✓ ' + (playerMove||'—') : (bestMove || '—');
  moveBst.style.fontWeight = '900';
  moveBst.style.color = isBest ? '#8B5E3C' : '#c0392b';
  cpBst.textContent = cpStr(cpBestMove);
  cpBst.className   = 'cp-val' + (cpBestMove >= 0 ? ' pos' : ' neg');

  btn.style.display = 'block';
  btn.disabled = false;
  btn.textContent = '🦉 Tobold erklärt warum';
  box.className = 'explain-box';
  box.innerHTML = '';
}

// KI-Erklärung: Token sparen + robustes JSON-Parsing
var EXPLAIN_LEGAL_MOVES_MAX = 40;

function truncateMoveListSAN(moves, maxN) {
  if (!moves || !moves.length) return '(keine)';
  if (moves.length <= maxN) return moves.join(', ');
  return moves.slice(0, maxN).join(', ') + ' … (+' + (moves.length - maxN) + ' weitere)';
}

function pvExampleFromSAN(pvSAN, maxPlies) {
  if (!pvSAN || !pvSAN.length) return '';
  var n = Math.min(maxPlies || 4, pvSAN.length);
  var slice = pvSAN.slice(0, n);
  return 'Orientierung an der Engine-Hauptvariante (erste Züge): ' + slice.join(' → ') + '.';
}

function parseExplainJson(raw) {
  var s = String(raw || '').replace(/```json|```/g, '').trim();
  try {
    var j = JSON.parse(s);
    return {
      summary: (j.summary || '').trim(),
      detail: (j.detail || j.explanation || '').trim()
    };
  } catch (e) {
    var m = s.match(/\{[\s\S]*\}/);
    if (m) {
      try {
        var j2 = JSON.parse(m[0]);
        return {
          summary: (j2.summary || '').trim(),
          detail: (j2.detail || j2.explanation || '').trim()
        };
      } catch (e2) {}
    }
  }
  return { summary: '', detail: s };
}

    '- SELBSTPRUEFUNG (mehrfach, vor dem JSON): Lies summary und detail noch einmal und prüfe JEDEN Satz gegen ASCII vor/nach und FEN. Stimmt Am-Zug? Liegt jede Figur auf dem Feld, das du behauptest? Passt Schlagen/Rochade/Bauer zum Brett? Wenn nein: umschreiben oder weglassen — nichts erfinden.\n\n' +

    (cpDeltaVsBefore !== null ? ('\n- Änderung durch deinen Zug (Nachher − Vorher): ' + (cpDeltaVsBefore >= 0 ? '+' : '') + (cpDeltaVsBefore / 100).toFixed(2) + ' Bauerneinheiten') : '') +

function askClaudeForFeedback(fen, fenAfter, playerMove, playerUci, bestMove, bestUci, cpBeforeEval, cpAfterActual, cpBestAfterEval, deltaVsBest, cpLoss, isBestMove, pvSAN) {
  // Compute legal moves for context
  var legalBefore = [], legalAfter = [];
  try { legalBefore = new Chess(fen).moves(); } catch(e) {}
  try { legalAfter  = new Chess(fenAfter).moves(); } catch(e) {}

  // Store full context for the explain button
  lastMoveContext = {
    fen: fen, fenAfter: fenAfter,
    playerMove: playerMove, playerUci: playerUci || '',
    bestMove: bestMove, bestUci: bestUci || '',
    cpBefore: cpBeforeEval, cpAfter: cpAfterActual, cpBestAfter: cpBestAfterEval,
    cpDeltaVsBest: deltaVsBest, cpLoss: cpLoss,
    isBestMove: isBestMove, pvSAN: pvSAN,
    legalBefore: legalBefore, legalAfter: legalAfter
  };

  var ratingKey = classifyMove(cpLoss, isBestMove);
  setMoveRating(ratingKey, cpAfterActual, cpBestAfterEval, playerMove, bestMove);
}

// ── EVAL BAR ──────────────────────────────────────────
// cp always from white's perspective: + = white better, - = black better
function setEval(cp) {
  if (cp === null || cp === undefined) return;
  if (evalOutcome) {
    if (evalOutcome === 'white-win') {
      document.getElementById('evalblk-b').style.flex = 0;
      document.getElementById('evalblk-w').style.flex = 100;
      document.getElementById('evallbl-w').textContent = 'SCHACHMATT';
      document.getElementById('evallbl-b').textContent = '—';
      var bLblW = document.querySelector('#evalblk-b .evalblk-label');
      var wLblW = document.querySelector('#evalblk-w .evalblk-label');
      if (bLblW) bLblW.textContent = 'Schwarz';
      if (wLblW) wLblW.textContent = 'Weiß gewinnt';
      return;
    }
    if (evalOutcome === 'black-win') {
      document.getElementById('evalblk-b').style.flex = 100;
      document.getElementById('evalblk-w').style.flex = 0;
      document.getElementById('evallbl-b').textContent = 'SCHACHMATT';
      document.getElementById('evallbl-w').textContent = '—';
      var bLblB = document.querySelector('#evalblk-b .evalblk-label');
      var wLblB = document.querySelector('#evalblk-w .evalblk-label');
      if (bLblB) bLblB.textContent = 'Schwarz gewinnt';
      if (wLblB) wLblB.textContent = 'Weiß';
      return;
    }
    if (evalOutcome === 'draw') {
      document.getElementById('evalblk-b').style.flex = 50;
      document.getElementById('evalblk-w').style.flex = 50;
      document.getElementById('evallbl-b').textContent = 'REMIS';
      document.getElementById('evallbl-w').textContent = 'PATT';
      var bLblD = document.querySelector('#evalblk-b .evalblk-label');
      var wLblD = document.querySelector('#evalblk-w .evalblk-label');
      if (bLblD) bLblD.textContent = 'Schwarz';
      if (wLblD) wLblD.textContent = 'Weiß';
      return;
    }
  }
  setEvalOutcome(null);
  var isMate = Math.abs(cp) > 9000;
  var clamped = Math.max(-500, Math.min(500, cp));
  // flex values: white gets more when cp > 0, black gets more when cp < 0
  // base 50/50, shift by up to 40
  var wFlex = 50 + (clamped / 500) * 40;
  var bFlex = 100 - wFlex;
  document.getElementById('evalblk-b').style.flex = bFlex;
  document.getElementById('evalblk-w').style.flex = wFlex;

  var absVal;
  if (isMate) {
    var MATE_BASE = 9000;
    var x = Math.abs(cp) - MATE_BASE;
    absVal = x && x >= 1 ? 'MATT in ' + x : 'MATT';
  } else {
    absVal = (Math.abs(cp) / 100).toFixed(2);
  }
  if (isMate) {
    document.getElementById('evallbl-w').textContent = cp > 0 ? absVal : '—';
    document.getElementById('evallbl-b').textContent = cp < 0 ? absVal : '—';
  } else {
    document.getElementById('evallbl-w').textContent = cp >= 0 ? '+' + absVal : (cp === 0 ? '0.00' : '—');
    document.getElementById('evallbl-b').textContent = cp <= 0 ? (cp === 0 ? '0.00' : '+' + (Math.abs(cp)/100).toFixed(2)) : '—';
  }

  // Abkürzen der Labels, wenn der jeweilige Block sehr klein ist
  var bLbl = document.querySelector('#evalblk-b .evalblk-label');
  var wLbl = document.querySelector('#evalblk-w .evalblk-label');
  if (bLbl) bLbl.textContent = bFlex < 20 ? 'S' : 'Schwarz';
  if (wLbl) wLbl.textContent = wFlex < 20 ? 'W' : 'Weiß';
}

// ── GAME END ──────────────────────────────────────────
function checkEnd() {
  if (!game) return false;
  if (game.in_checkmate()) {
    var ww = game.turn() === 'b';
    setEvalOutcome(ww ? 'white-win' : 'black-win');
    setEval(ww ? 9101 : -9101);
    setGameStatus(ww ? '🎉 Schachmatt! Gewonnen!' : '❌ Niederlage — neue Stellung!', ww ? 'win' : 'lose');
    return true;
  }
  if (game.in_stalemate() || game.in_draw()) {
    setEvalOutcome('draw');
    setEval(0);
    setGameStatus('½ Remis — Patt oder Dauerschach!', 'draw');
    return true;
  }
  var pos = game.fen().split(' ')[0];
  if (pos.indexOf('Q') >= 0 && hist[0] && hist[0].fen.split(' ')[0].indexOf('Q') < 0) {
    setGameStatus('👑 Umwandlung! Bauer wird Dame.', 'win');
  }
  return false;
}

// ── UNDO ──────────────────────────────────────────────
function undoLast() {
  if (!hist || hist.length <= 1) { setGameStatus('Das ist bereits die Ausgangsstellung.', ''); return; }
  // Keep undo user-friendly for a "you are always White" flow:
  // step back until we land on a position where White is to move.
  hist.pop();
  while (hist.length > 1) {
    var probe = null;
    try { probe = new Chess(hist[hist.length - 1].fen); } catch (e) {}
    if (probe && probe.turn() === 'w') break;
    hist.pop();
  }
  game = new Chess(hist[hist.length - 1].fen);
  sel = null; lastMv = null; busy = false;
  setEvalOutcome(null);
  mvCnt = Math.max(1, mvCnt - 1);
  document.getElementById('mctr').textContent = 'ZUG ' + mvCnt;
  renderBoard();
  setGameStatus('', '');
  resetRatingCard();
  updateSituation();
  evalPosition(game.fen(), 10).then(function(cp) { if (cp !== null) setEval(cp); });
  setTurnDot(true);
}

    goals:['Schwarzen König an den Rand treiben (Box-Methode mit der Dame)','Weißen König einsetzen — Dame allein kann nicht mattsetzen','Box immer kleiner ziehen bis Matt','Kein Patt durch zu enge Einschränkung!'],
    warnings:['⚠️ PATT! Dame zu nah → schwarzer König hat keine Züge = Remis','⚠️ Dame allein kann nicht mattsetzen — König MUSS mitspielen','⚠️ Bauer nicht zu nah an schwarzen König schieben — Pattgefahr'],
    tip:'💡 Box-Methode: Mit Dame ein immer kleiner werdendes Rechteck um den schwarzen König ziehen, dann König einmarschieren lassen.'
  },
  {
    id:'qp_vs_q',priority:65,
    match:function(p){return p.wQ>=1&&p.bQ>=1&&p.wP>=1&&p.bP===0;},

    goals:['Bauer auf die 7. Reihe bringen — das ist das Hauptziel','Dauerschach vermeiden: König nicht am Rand, möglichst zentralisiert','Damentausch erzwingen wenn Bauer weit genug vorgedrungen','Schwarze Dame vom Bauer fernhalten'],

  },
  {
    id:'passed_race',priority:60,
    match:function(p){return p.wP>=1&&p.bP>=1&&noOther(p);},
    title:'Freibauer — Quadratregel & Rennen',
    goals:['Quadratregel prüfen: Kann schwarzer König den Bauern im Quadrat stoppen?','Umwandlung mit Schach anstreben — spart 1 Tempo','Opposition nutzen um gegnerischen Freibauern zu blockieren','Tempozählen: Wer verwandelt zuerst? Bei Gleichstand: Schach beim Umwandeln'],

function noOther(p){return p.wQ===0&&p.bQ===0&&p.wR===0&&p.bR===0&&p.wB===0&&p.bB===0&&p.wN===0&&p.bN===0;}

function getPieceCounts(){
  if(!game)return null;
  var b=game.board();
  var p={wP:0,bP:0,wK:0,bK:0,wQ:0,bQ:0,wR:0,bR:0,wB:0,bB:0,wN:0,bN:0,wPfiles:[],bPfiles:[]};
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var sq=b[r][c]; if(!sq)continue;
    var k=(sq.color==='w'?'w':'b')+sq.type.toUpperCase();
    p[k]++;
    if(sq.type==='p'){ if(sq.color==='w')p.wPfiles.push(c); else p.bPfiles.push(c); }
  }
  return p;
}

function detectSituation(){
  var p=getPieceCounts(); if(!p)return null;
  var matches=ENDGAME_CATALOG.filter(function(e){try{return e.match(p);}catch(e){return false;}});
  if(!matches.length)return null;
  matches.sort(function(a,b){return b.priority-a.priority;});
  return matches[0];
}

var sitOpen=true, warnOpen=false;

function updateSituation(){
  var sit=detectSituation();
  var panel=document.getElementById('situation-panel');
  if(!sit){panel.style.display='none';return;}
  panel.style.display='block';
  document.getElementById('sit-title').textContent=sit.title;

  // Goals
  var gl=document.getElementById('sit-goals');
  gl.innerHTML=sit.goals.map(function(g){
    return '<div style="font-size:12px;font-weight:700;color:#3d3d3a;padding:3px 0;border-bottom:0.5px solid #f0ede5;">'+g+'</div>';
  }).join('');

  // Warnings
  var wl=document.getElementById('sit-warnings');
  wl.innerHTML=sit.warnings.map(function(w){
    return '<div style="font-size:12px;font-weight:700;color:#c0392b;padding:3px 0;">'+w+'</div>';
  }).join('');

  // Tip
  document.getElementById('sit-tip').textContent=sit.tip;

  // Reset warnings visibility
  warnOpen=false;
  wl.style.display='none';
  document.getElementById('warn-btn').textContent='⚠️ Häufige Fehler zeigen';
}

function toggleSituation(){
  sitOpen=!sitOpen;
  document.getElementById('sit-body').style.display=sitOpen?'flex':'none';
  document.getElementById('sit-arrow').textContent=sitOpen?'▼':'▶';
}

function toggleWarnings(){
  warnOpen=!warnOpen;
  document.getElementById('sit-warnings').style.display=warnOpen?'block':'none';
  document.getElementById('warn-btn').textContent=warnOpen?'▲ Ausblenden':'⚠️ Häufige Fehler zeigen';
}
